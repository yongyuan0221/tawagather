<script type="module">
'use strict';

// ─── Firebase ────────────────────────────────────────────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, doc,
  onSnapshot, addDoc, updateDoc,
  arrayUnion, arrayRemove,
} from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            'AIzaSyCnGDljLf5h_ghzrJnDJswJ4ddd1UEvt4Y',
  authDomain:        'tawagather.firebaseapp.com',
  projectId:         'tawagather',
  storageBucket:     'tawagather.firebasestorage.app',
  messagingSenderId: '321737955720',
  appId:             '1:321737955720:web:962104158a01beeabc423d',
};

const fbApp = initializeApp(firebaseConfig);
const db = initializeFirestore(fbApp, {
  localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }),
});
const eventsCol = collection(db, 'events');
const usersCol  = collection(db, 'users');

// ─── Firestore helpers ───────────────────────────────────────────────────────
const eventDoc = id => doc(db, 'events', id);
function writeDoc(p, msg) { return p.catch(() => toast(msg)); }

// ─── Constants ──────────────────────────────────────────────────────────────

const CAT_ICON = { sports: 'sports_soccer', food: 'rice_bowl' };
const CAT_LABEL = { sports: 'Sports', food: 'Food & Drinks' };

// ─── Session state ───────────────────────────────────────────────────────────
let sessionName = null;   // identity claimed for the current event view; cleared on board/create nav

// ─── Registered users (merged from users collection + event participants) ────
let allUsers = [];
let _firestoreUsers = [];
let _eventParticipants = [];

function _rebuildAllUsers() {
  const seen = new Set();
  const merged = [];
  for (const name of [..._firestoreUsers, ..._eventParticipants]) {
    const key = name.toLowerCase();
    if (!seen.has(key)) { seen.add(key); merged.push(name); }
  }
  allUsers = merged.sort((a, b) => a.localeCompare(b));
}

onSnapshot(usersCol, snap => {
  _firestoreUsers = snap.docs.map(d => d.data().name);
  _rebuildAllUsers();
}, err => console.error('Users listener error', err));

// ─── App state ───────────────────────────────────────────────────────────────
const state = {
  view: 'loading',         // 'loading' | 'board' | 'create' | 'detail' | 'manage'
  filter: 'all',
  selectedId: null,
  editing: false,
};

// ─── Events (Firestore) ──────────────────────────────────────────────────────
let events = [];
const _deepLinkId = new URLSearchParams(location.search).get('event');

onSnapshot(eventsCol, snap => {
  events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const participants = new Set();
  events.forEach(ev => {
    ev.attendees?.forEach(a => participants.add(a));
    if (ev.host) participants.add(ev.host);
  });
  _eventParticipants = [...participants];
  _rebuildAllUsers();
  if (state.view === 'loading') {
    if (_deepLinkId && events.find(e => e.id === _deepLinkId)) {
      state.view = 'detail';
      state.selectedId = _deepLinkId;
    } else {
      state.view = 'board';
    }
  }
  render();
}, err => {
  console.error('Firestore error', err);
  toast('Connection error — please refresh.');
});

// ─── Helpers ─────────────────────────────────────────────────────────────────

function esc(str) {
  const d = document.createElement('div');
  d.textContent = (str ?? '');
  return d.innerHTML;
}

function fmtDateTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const isSameDay = (a, b) =>
    a.getFullYear() === b.getFullYear() &&
    a.getMonth()    === b.getMonth()    &&
    a.getDate()     === b.getDate();
  const tom = new Date(now); tom.setDate(now.getDate() + 1);
  const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  if (isSameDay(d, now))  return `Today, ${time}`;
  if (isSameDay(d, tom))  return `Tomorrow, ${time}`;
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ', ' + time;
}

function fmtDateTimeLong(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) +
         ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function fmtDateParts(iso) {
  const d   = new Date(iso);
  const now = new Date();
  const tom = new Date(now); tom.setDate(now.getDate() + 1);
  const isSameDay = (a, b) =>
    a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  const time     = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  const month    = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
  const dayNum   = d.getDate();
  const weekday  = isSameDay(d, now) ? 'Today'
                 : isSameDay(d, tom) ? 'Tomorrow'
                 : d.toLocaleDateString('en-US', { weekday: 'long' });
  const fullDate = isSameDay(d, now) || isSameDay(d, tom) ? null
                 : d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  return { month, dayNum, weekday, fullDate, time };
}

function toLocalDtInput(iso) {
  // Convert ISO to value compatible with datetime-local input
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function minDtInput() {
  return toLocalDtInput(new Date().toISOString());
}

function capacityStatus(ev) {
  const n = ev.attendees.length, c = ev.cap, pct = n / c;
  if (n >= c)   return { label: 'Full',        labelCls: 'text-on-surface-variant',  barCls: 'bg-outline',           pct: 100 };
  if (pct>=0.9) return { label: 'Almost Full', labelCls: 'text-primary',             barCls: 'bg-primary-container', pct: pct*100 };
  return          { label: 'Available',    labelCls: 'text-secondary',          barCls: 'bg-secondary',         pct: pct*100 };
}

function isFull(ev)   { return ev.attendees.length >= ev.cap; }
function isJoined(ev) { return !!sessionName && ev.attendees.some(a => a.toLowerCase() === sessionName.toLowerCase()); }
function isHost(ev)   { return !!sessionName && ev.host === sessionName; }

function getEvent(id) { return events.find(e => e.id === id) ?? null; }

function filteredSorted() {
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);

  return events
    .filter(e => {
      if (state.filter !== 'all' && e.category !== state.filter) return false;
      // Hide any event (active or cancelled) once its calendar day is in the past
      const evDay = new Date(e.dateTime);
      evDay.setHours(0, 0, 0, 0);
      return evDay >= todayStart;
    })
    .sort((a, b) => {
      if (a.cancelled !== b.cancelled) return a.cancelled ? 1 : -1;
      return new Date(a.dateTime) - new Date(b.dateTime);
    });
}

// ─── Toast ───────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.add('hidden'), 2800);
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function navigate(view, id = null) {
  if (view === 'board' || view === 'create') sessionName = null;
  state.view = view;
  state.selectedId = id;
  state.editing = false;
  if (view === 'detail' && id) {
    history.pushState(null, '', `?event=${id}`);
  } else {
    history.replaceState(null, '', location.pathname);
  }
  render();
  window.scrollTo({ top: 0 });
}

// ─── Name-modal logic ────────────────────────────────────────────────────────
let _nameCallback = null;

function _openNameModal(title, desc, options, allowNew) {
  document.getElementById('name-modal-title').textContent = title;
  document.getElementById('name-modal-desc').textContent  = desc;
  const sel = document.getElementById('name-select');
  sel.innerHTML = `<option value="">— Select your name —</option>` +
    options.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('') +
    (allowNew ? `<option value="__new__">➕ Add new name…</option>` : '');
  document.getElementById('new-name-row').classList.add('hidden');
  document.getElementById('new-name-first').value = '';
  document.getElementById('new-name-initial').value = '';
  document.getElementById('name-error').classList.add('hidden');
  document.getElementById('name-modal').classList.remove('hidden');
  setTimeout(() => sel.focus(), 50);
}

// Shows all registered users + "add new" option (for join / create)
function promptName(title, desc, cb) {
  _openNameModal(title, desc, allUsers, true);
  _nameCallback = cb;
}

// Shows only the event's attendee list (for claiming existing attendance)
function promptAttendee(attendees, title, desc, cb) {
  _openNameModal(title, desc, attendees, false);
  _nameCallback = cb;
}

const LETTERS_ONLY = /^[a-zA-Z]+$/;

function closeNameModal(confirmed) {
  if (!confirmed) {
    document.getElementById('name-modal').classList.add('hidden');
    _nameCallback = null;
    return;
  }
  const sel   = document.getElementById('name-select');
  const isNew = sel.value === '__new__';
  const err   = document.getElementById('name-error');

  if (!isNew) {
    if (!sel.value) {
      err.textContent = 'Please select your name.';
      err.classList.remove('hidden');
      sel.focus();
      return;
    }
    document.getElementById('name-modal').classList.add('hidden');
    if (_nameCallback) { _nameCallback(sel.value, false); _nameCallback = null; }
    return;
  }

  const firstRaw   = document.getElementById('new-name-first').value.trim();
  const initialRaw = document.getElementById('new-name-initial').value.trim();

  if (!firstRaw) {
    err.textContent = 'Please enter your first name.';
    err.classList.remove('hidden');
    document.getElementById('new-name-first').focus();
    return;
  }
  if (!LETTERS_ONLY.test(firstRaw)) {
    err.textContent = 'First name must contain letters only.';
    err.classList.remove('hidden');
    document.getElementById('new-name-first').focus();
    return;
  }
  if (!initialRaw) {
    err.textContent = 'Please enter your last initial.';
    err.classList.remove('hidden');
    document.getElementById('new-name-initial').focus();
    return;
  }
  if (!LETTERS_ONLY.test(initialRaw)) {
    err.textContent = 'Last initial must be a letter.';
    err.classList.remove('hidden');
    document.getElementById('new-name-initial').focus();
    return;
  }

  const name = `${firstRaw.charAt(0).toUpperCase()}${firstRaw.slice(1)} ${initialRaw.toUpperCase()}`;
  const dup = allUsers.find(u => u.toLowerCase() === name.toLowerCase());
  if (dup) {
    err.textContent = `"${dup}" already exists — select from the list instead.`;
    err.classList.remove('hidden');
    document.getElementById('new-name-first').focus();
    return;
  }

  document.getElementById('name-modal').classList.add('hidden');
  if (_nameCallback) { _nameCallback(name, true); _nameCallback = null; }
}

document.getElementById('name-confirm-btn').addEventListener('click', () => closeNameModal(true));
document.getElementById('name-cancel-btn').addEventListener('click',  () => closeNameModal(false));
document.getElementById('name-backdrop').addEventListener('click',    () => closeNameModal(false));
document.getElementById('name-select').addEventListener('change', () => {
  const isNew = document.getElementById('name-select').value === '__new__';
  document.getElementById('new-name-row').classList.toggle('hidden', !isNew);
  document.getElementById('name-error').classList.add('hidden');
  if (isNew) setTimeout(() => document.getElementById('new-name-first').focus(), 50);
});
document.getElementById('new-name-first').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('new-name-initial').focus();
  document.getElementById('name-error').classList.add('hidden');
});
document.getElementById('new-name-initial').addEventListener('keydown', e => {
  if (e.key === 'Enter') closeNameModal(true);
  document.getElementById('name-error').classList.add('hidden');
});
// Block non-letter input on both new-name fields
['new-name-first', 'new-name-initial'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    this.value = this.value.replace(/[^a-zA-Z]/g, '');
  });
});

// ─── Cancel-confirm modal ─────────────────────────────────────────────────────
let _cancelCallback = null;

function confirmCancel(cb) {
  document.getElementById('confirm-modal').classList.remove('hidden');
  _cancelCallback = cb;
}

document.getElementById('confirm-ok-btn').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.add('hidden');
  if (_cancelCallback) { _cancelCallback(); _cancelCallback = null; }
});
document.getElementById('confirm-back-btn').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.add('hidden');
  _cancelCallback = null;
});
document.getElementById('confirm-backdrop').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.add('hidden');
  _cancelCallback = null;
});

// ─── Actions (all writes go straight to Firestore) ───────────────────────────

// Register a new name in the users collection if not already there
function registerName(name) {
  const exists = allUsers.some(u => u.toLowerCase() === name.toLowerCase());
  if (!exists) {
    addDoc(usersCol, { name, createdAt: new Date().toISOString() })
      .catch(() => toast('Could not save name — check your connection.'));
  }
}

function actionJoin(id) {
  const ev = getEvent(id);
  if (!ev || ev.cancelled || isFull(ev)) return;

  promptName(
    "Who are you?",
    "Select your name or add a new one to join.",
    (name, isNew) => {
      // Already on the list → auto-claim attendance (manage mode)
      if (ev.attendees.some(a => a.toLowerCase() === name.toLowerCase())) {
        sessionName = name;
        toast("You're already on the list!");
        render(); return;
      }
      if (isFull(ev)) { toast("Sorry, this event just filled up!"); return; }
      if (isNew) registerName(name);
      writeDoc(updateDoc(eventDoc(id), { attendees: arrayUnion(name) }), 'Could not join — check your connection.');
      sessionName = name;
      toast("You're in! 🎉");
      render();
    }
  );
}

function actionLeave(id) {
  if (!sessionName) return;
  const name = sessionName;
  sessionName = null;
  writeDoc(updateDoc(eventDoc(id), { attendees: arrayRemove(name) }), 'Could not leave — check your connection.');
  toast("You've left the event");
  render();
}

function actionShare(id) {
  const ev  = getEvent(id);
  const url = `${location.origin}${location.pathname}?event=${id}`;
  if (navigator.share) {
    navigator.share({ url, title: ev?.title ?? 'Tawagather Event' }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url)
      .then(() => toast('Link copied!'))
      .catch(() => toast('Could not copy link.'));
  }
}

function actionManage(id) {
  const ev = getEvent(id);
  if (!ev || !ev.attendees.length) return;
  promptAttendee(
    ev.attendees,
    "Which one are you?",
    "Select your name to manage your participation.",
    name => { sessionName = name; render(); }
  );
}

function actionCreate(fd) {
  promptName(
    "Who's organizing this?",
    "Select your name or add a new one as the event host.",
    async (name, isNew) => {
      navigate('board');
      if (isNew) registerName(name);
      const data = {
        title:       fd.title.trim(),
        category:    fd.category,
        dateTime:    new Date(fd.dateTime).toISOString(),
        location:    fd.location.trim(),
        cap:         Math.max(2, parseInt(fd.cap, 10)),
        description: (fd.description || '').trim(),
        host:        name,
        attendees:   [name],
        cancelled:   false,
        createdAt:   new Date().toISOString(),
      };
      try {
        await addDoc(eventsCol, data);
        toast('Event created! 🎉');
      } catch {
        toast('Could not create event — check your connection.');
      }
    }
  );
}

function actionEdit(id, fd) {
  const ev = getEvent(id);
  if (!ev) return;
  const newCap = Math.max(ev.attendees.length, parseInt(fd.cap, 10));
  writeDoc(updateDoc(eventDoc(id), {
    title:       fd.title.trim(),
    category:    fd.category,
    dateTime:    new Date(fd.dateTime).toISOString(),
    location:    fd.location.trim(),
    cap:         newCap,
    description: (fd.description || '').trim(),
  }), 'Could not save changes — check your connection.');
  toast('Event updated');
  state.editing = false;
  render();
}

function actionCancel(id) {
  confirmCancel(() => {
    writeDoc(updateDoc(eventDoc(id), { cancelled: true }), 'Could not cancel event — check your connection.');
    toast('Event cancelled');
    render();
  });
}

          const { month, dayNum, weekday, fullDate, time } = fmtDateParts(ev.dateTime);
          return `
        <div class="flex items-center gap-sm mt-sm p-sm rounded-xl border border-outline-variant bg-surface-container-low">
          <div class="flex flex-col items-center justify-center w-14 h-14 rounded-xl shrink-0
                      ${ev.cancelled ? 'bg-surface-container-high' : 'bg-primary'}">
            <span class="text-[11px] font-bold leading-none uppercase tracking-wider
                         ${ev.cancelled ? 'text-on-surface-variant' : 'text-on-primary'}">${month}</span>
            <span class="text-[28px] font-bold leading-none
                         ${ev.cancelled ? 'text-on-surface-variant' : 'text-on-primary'}">${dayNum}</span>
          </div>
          <div>
            <p class="text-headline-sm text-on-surface font-semibold leading-tight">${weekday}${fullDate ? `, ${fullDate}` : ''}</p>
            <p class="text-body-md text-primary font-semibold leading-tight mt-xs">${time}</p>
          </div>
        </div>`;
        })()}
      </section>

      ${actionPanel}

      ${ev.description ? `
        <section class="pt-xs">
          <h3 class="text-headline-sm text-on-surface mb-sm">About this event</h3>
          <p class="text-body-md text-on-surface-variant leading-relaxed">${esc(ev.description)}</p>
        </section>` : ''}

      <!-- Attendees -->
      <section class="pt-sm border-t border-surface-variant">
        <div class="flex items-center justify-between mb-sm">
          <h3 class="text-headline-sm text-on-surface">Attendees</h3>
          <span class="text-label-lg text-on-surface-variant">${ev.attendees.length} / ${ev.cap}</span>
        </div>
        <div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden mb-md">
          <div class="h-full ${st.barCls} rounded-full progress-fill" style="width:${st.pct}%"></div>
        </div>
        ${ev.attendees.length
          ? `<ul class="flex flex-col gap-base">${attendeeItems}</ul>`
          : `<p class="text-body-md text-on-surface-variant/50 text-center py-md">No one has joined yet — be first!</p>`
        }
      </section>

    </main>`;
}

// ─── Manage view ──────────────────────────────────────────────────────────────
function renderManage() {
  const ev = getEvent(state.selectedId);
  if (!ev) return `<div class="p-md text-body-md text-on-surface-variant">Event not found.</div>`;

  const inputCls = `w-full h-14 px-sm rounded-md border border-outline bg-surface text-on-surface
                    text-body-md focus:border-primary focus:ring-1 focus:ring-primary
                    outline-none transition-all`;

  const editForm = `
    <form id="edit-form" class="flex flex-col gap-md" onsubmit="submitEdit(event)">
      <label class="flex flex-col gap-xs">
        <span class="text-label-lg text-on-surface">Event Title *</span>
        <input name="title" type="text" required maxlength="80"
          value="${esc(ev.title)}" class="${inputCls}" />
      </label>
      <label class="flex flex-col gap-xs">
        <span class="text-label-lg text-on-surface">Category *</span>
        <select name="category" required class="${inputCls} appearance-none">
          <option value="sports" ${ev.category==='sports'?'selected':''}>⚽ Sports</option>
          <option value="food"   ${ev.category==='food'  ?'selected':''}>🍜 Food &amp; Drinks</option>
        </select>
      </label>
      <label class="flex flex-col gap-xs">
        <span class="text-label-lg text-on-surface">Date &amp; Time *</span>
        <input name="dateTime" type="datetime-local" required
          value="${toLocalDtInput(ev.dateTime)}"
          min="${minDtInput()}"
          class="${inputCls}" />
      </label>
      <label class="flex flex-col gap-xs">
        <span class="text-label-lg text-on-surface">Location *</span>
        <input name="location" type="text" required maxlength="100"
          value="${esc(ev.location)}" class="${inputCls}" />
      </label>
      <label class="flex flex-col gap-xs">
        <span class="text-label-lg text-on-surface">Max Headcount *</span>
        <input name="cap" type="number" required
          min="${ev.attendees.length}" max="100"
          value="${ev.cap}" class="${inputCls}" />
        <span class="text-label-md text-on-surface-variant">
          Minimum ${ev.attendees.length} (current attendee count)
        </span>
      </label>
      <label class="flex flex-col gap-xs">
        <span class="text-label-lg text-on-surface">
          Description
          <span class="text-body-md text-on-surface-variant font-normal">(Optional)</span>
        </span>
        <textarea name="description" rows="3" maxlength="500"
          class="px-sm py-sm rounded-md border border-outline bg-surface text-on-surface
                 text-body-md focus:border-primary focus:ring-1 focus:ring-primary
                 outline-none transition-all resize-y min-h-[96px]">${esc(ev.description)}</textarea>
      </label>
      <div class="flex gap-sm">
        <button type="button" onclick="state.editing=false; render()"
          class="flex-1 h-12 rounded-full border border-outline text-on-surface
                 text-label-lg hover:bg-surface-container transition-colors">
          Discard
        </button>
        <button type="submit"
          class="flex-1 h-12 rounded-full bg-primary text-on-primary
                 text-label-lg hover:bg-surface-tint transition-colors shadow-sm">
          Save Changes
        </button>
      </div>
    </form>`;

  const pct = Math.round(ev.attendees.length / ev.cap * 100);
  const readView = `
    <div class="bg-surface-container-lowest rounded-xl border border-surface-variant p-md
                shadow-card ${ev.cancelled ? 'opacity-60' : ''}">
      <div class="flex items-start gap-md mb-md">
        <div class="w-12 h-12 rounded-full shrink-0 flex items-center justify-center text-[24px]
                    ${ev.cancelled ? 'bg-surface-container text-on-surface-variant' : 'bg-secondary-container text-on-secondary-container'}">
          ${ev.category==='sports' ? '⚽' : '🍜'}
        </div>
        <div class="flex-1 min-w-0">
          <span class="inline-flex bg-secondary-container text-on-secondary-container
                       px-sm py-xs rounded-full text-label-md mb-xs">${CAT_LABEL[ev.category]}</span>
          <h3 class="text-headline-md text-on-surface">${esc(ev.title)}</h3>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-md py-md border-t border-surface-variant">
        <div>
          <p class="text-label-lg text-on-surface-variant mb-xs">Host</p>
          <p class="text-body-md text-on-surface flex items-center gap-xs">
            <span class="material-symbols-outlined text-[18px] shrink-0">person</span>${esc(ev.host)}
          </p>
        </div>
        <div>
          <p class="text-label-lg text-on-surface-variant mb-xs">Date &amp; Time</p>
          <p class="text-body-md text-on-surface flex items-center gap-xs">
            <span class="material-symbols-outlined text-[18px] shrink-0">schedule</span>${fmtDateTimeLong(ev.dateTime)}
          </p>
        </div>
        <div>
          <p class="text-label-lg text-on-surface-variant mb-xs">Location</p>
          <p class="text-body-md text-on-surface flex items-center gap-xs">
            <span class="material-symbols-outlined text-[18px] shrink-0">location_on</span>${esc(ev.location)}
          </p>
        </div>
        <div>
          <p class="text-label-lg text-on-surface-variant mb-xs">Spots</p>
          <p class="text-body-md text-on-surface flex items-center gap-xs">
            <span class="material-symbols-outlined text-[18px] shrink-0">group</span>
            ${ev.attendees.length} / ${ev.cap}
          </p>
          <div class="w-full h-2 bg-surface-variant rounded-full mt-sm overflow-hidden">
            <div class="h-full bg-secondary rounded-full progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
      </div>

      ${ev.description ? `
        <div class="pt-md border-t border-surface-variant">
          <p class="text-label-lg text-on-surface-variant mb-xs">Description</p>
          <p class="text-body-md text-on-surface">${esc(ev.description)}</p>
        </div>` : ''}
    </div>

    ${!ev.cancelled ? `
      <div class="flex flex-col gap-base">
        <button onclick="state.editing=true; render()"
          class="w-full min-h-[48px] bg-primary text-on-primary rounded-md text-label-lg
                 flex items-center justify-center gap-xs hover:bg-surface-tint transition-colors">
          <span class="material-symbols-outlined text-[20px]">edit</span>
          Edit Details
        </button>
        <button onclick="actionCancel('${ev.id}')"
          class="w-full min-h-[48px] border-2 border-error text-error rounded-md text-label-lg
                 flex items-center justify-center gap-xs hover:bg-error-container transition-colors">
          <span class="material-symbols-outlined text-[20px]">cancel</span>
          Cancel Event
        </button>
      </div>` : ''}`;

  return `
    ${hdrBack(state.editing ? 'Edit Event' : 'Manage Event', `navigate('detail','${ev.id}')`)}

    ${ev.cancelled ? `
      <div class="px-container-margin pt-md">
        <div class="bg-error-container text-on-error-container p-md rounded-xl
                    flex flex-col items-center gap-base border border-error text-center">
          <span class="material-symbols-outlined text-[48px] icon-fill text-error">cancel</span>
          <h2 class="text-headline-md text-on-error-container">Event Cancelled</h2>
          <p class="text-body-md text-on-error-container/80">
            This event has been cancelled. Details remain for reference.
          </p>
        </div>
      </div>` : ''}

    <main class="max-w-[600px] mx-auto px-container-margin py-md pb-xl flex flex-col gap-lg w-full">
      ${state.editing ? editForm : readView}
    </main>`;
}

function submitEdit(e) {
  e.preventDefault();
  const fd = new FormData(document.getElementById('edit-form'));
  actionEdit(state.selectedId, Object.fromEntries(fd.entries()));
}

// ─── Global helpers exposed to inline handlers ────────────────────────────────
function setFilter(f) { state.filter = f; render(); }

// ─── Loading view ─────────────────────────────────────────────────────────────
function renderLoading() {
  return `
    <div class="flex-1 flex flex-col items-center justify-center gap-md py-xl">
      <div class="w-12 h-12 rounded-full border-4 border-surface-container-high border-t-primary animate-spin"></div>
      <p class="text-body-md text-on-surface-variant">Loading events…</p>
    </div>`;
}

// ─── Main render ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  switch (state.view) {
    case 'loading': app.innerHTML = renderLoading(); break;
    case 'board':   app.innerHTML = renderBoard();   break;
    case 'create':  app.innerHTML = renderCreate();  break;
    case 'detail':  app.innerHTML = renderDetail();  break;
    case 'manage':  app.innerHTML = renderManage();  break;
    default:        app.innerHTML = renderBoard();
  }
}

// ─── Expose to inline onclick handlers (ES module scope is isolated) ──────────
window.navigate      = navigate;
window.setFilter     = setFilter;
window.actionJoin    = actionJoin;
window.actionLeave   = actionLeave;
window.actionManage  = actionManage;
window.actionCancel  = actionCancel;
window.actionShare   = actionShare;
window.submitCreate  = submitCreate;
window.submitEdit    = submitEdit;
window.state         = state;
window.render        = render;

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.view !== 'loading') render();
});

window.addEventListener('popstate', () => {
  const id = new URLSearchParams(location.search).get('event');
  if (id) {
    state.view = 'detail';
    state.selectedId = id;
  } else {
    sessionName = null;
    state.view = 'board';
    state.selectedId = null;
  }
  state.editing = false;
  render();
});

// ─── Boot ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
